<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Адмінка</title>
</head>

<body>

<h2>Додати рослину</h2>

<input id="name" placeholder="Назва">
<input id="desc" placeholder="Опис">
<input id="price" placeholder="Ціна">
<input id="category" placeholder="Категорія">

<button onclick="addPlant()">Додати</button>

<script>
function addPlant() {
  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;

  let plants = JSON.parse(localStorage.getItem("plants")) || [];

  plants.push({
    name,
    desc,
    price,
    category
  });

  localStorage.setItem("plants", JSON.stringify(plants));

  alert("Додано!");

  document.getElementById("name").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("price").value = "";
  document.getElementById("category").value = "";
}
</script>

</body>
</html>

<script>
function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let category = document.getElementById("category").value;
  let image = document.getElementById("image").value;

  let plants = JSON.parse(localStorage.getItem("plants")) || [];

  let newProduct = {
    id: Date.now(),
    name,
    price: Number(price),
    category,
    image
  };

  plants.push(newProduct);

  localStorage.setItem("plants", JSON.stringify(plants));

  alert("Товар додано!");
}
</script>
