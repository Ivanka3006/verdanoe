<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Каталог</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    .main {
      width: 70%;
      padding: 20px;
    }

    .catalog {
      display: flex;
      flex-wrap: wrap;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px;
      width: 220px;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .cart {
      width: 30%;
      border-left: 2px solid #ddd;
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background: #f5f5f5;
    }

    button {
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="main">
  <h2>🌿 Каталог</h2>
  <div id="catalog" class="catalog"></div>
</div>

<div class="cart">
  <h2>🛒 Кошик</h2>
  <div id="cart-box"></div>
</div>

<script src="script.js"></script>

</body>
</html>
