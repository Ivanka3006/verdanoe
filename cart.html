<h2>🛒 Кошик</h2>

<div id="cart"></div>
<h3 id="total"></h3>

<button onclick="checkout()">Оформити замовлення</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const div = document.getElementById("cart");
const totalDiv = document.getElementById("total");

function renderCart() {
  if (cart.length === 0) {
    div.innerHTML = "Кошик пустий";
    totalDiv.innerHTML = "";
    return;
  }

  let total = 0;

  div.innerHTML = cart.map((item, index) => {
    total += Number(item.price) * (item.qty || 1);

    return `
      <div>
        <h3>${item.name}</h3>
        <p>Ціна: ${item.price} грн</p>
        <p>Кількість: ${item.qty || 1}</p>
        <button onclick="removeItem(${index})">❌ Видалити</button>
      </div>
    `;
  }).join("");

  totalDiv.innerHTML = "Сума: " + total + " грн";
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function checkout() {
  alert("Замовлення оформлено!");
  localStorage.removeItem("cart");
  renderCart();
}

renderCart();
</script>
