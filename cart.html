<div id="cart"></div>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const div = document.getElementById("cart");

if (cart.length > 0) {
  div.innerHTML = cart.map(item => `
    <div>
      <h3>${item.name}</h3>
      <b>${item.price} грн</b>
    </div>
  `).join("");
} else {
  div.innerHTML = "Кошик пустий";
}
</script>
